<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#f4f4f5;color:#18181b;min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:70px}
.hide-scrollbar::-webkit-scrollbar{display:none}
.hide-scrollbar{-ms-overflow-style:none;scrollbar-width:none}

/* ── Top Header ── */
.top-header{background:linear-gradient(135deg,#1a103c 0%,#261654 50%,#1a103c 100%);text-align:center;padding:28px 16px 18px;color:#fff}
.top-header img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.15);margin-bottom:8px}
.top-header h1{font-size:1.3rem;font-weight:800;color:#a78bfa}
.top-header .handle{font-size:.82rem;color:rgba(255,255,255,.6)}

/* ── Nav Tabs ── */
.nav-tabs{display:flex;align-items:center;gap:0;padding:0 8px;background:linear-gradient(135deg,#1e1245,#2a1760);overflow-x:auto}
.nav-tabs a{color:rgba(255,255,255,.7);text-decoration:none;font-size:.82rem;font-weight:600;padding:10px 14px;white-space:nowrap;transition:all .2s}
.nav-tabs a:hover,.nav-tabs a.active{color:#fff;background:rgba(255,255,255,.08);border-radius:8px}
.nav-tabs .spacer{flex:1}
.lang-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.08);border-radius:8px;padding:6px 10px;font-size:.78rem;color:#fff;font-weight:600;cursor:pointer}
.profile-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);border-radius:20px;padding:5px 12px 5px 6px;font-size:.78rem;color:#f5a623;font-weight:700;text-decoration:none;cursor:pointer}
.profile-badge .dot{width:24px;height:24px;border-radius:50%;background:#f59e0b;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:#000}

/* ── Search ── */
.search-wrap{background:#fff;padding:12px 12px 8px}
.search-bar{display:flex;align-items:center;gap:8px;background:#f4f4f5;border:1px solid #e4e4e7;border-radius:24px;padding:4px 6px 4px 16px}
.search-bar input{flex:1;border:none;background:transparent;outline:none;font-size:.9rem;padding:8px 0;font-family:inherit;color:#18181b}
.search-bar input::placeholder{color:#a1a1aa}
.search-bar .cam-btn{width:34px;height:34px;border-radius:50%;background:transparent;border:none;color:#a1a1aa;cursor:pointer;display:flex;align-items:center;justify-content:center}
.search-bar .go-btn{width:36px;height:36px;border-radius:50%;background:#f97316;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── Category Tabs ── */
.cat-tabs{display:flex;overflow-x:auto;gap:0;background:#fff;border-bottom:1px solid #e4e4e7;padding:0 4px}
.cat-tabs button{background:none;border:none;padding:10px 14px;font-size:.82rem;font-weight:500;color:#71717a;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:inherit;transition:all .2s}
.cat-tabs button.active{color:#18181b;font-weight:700;border-bottom-color:#18181b}

/* ── Trending Row ── */
.trending-row{display:flex;gap:10px;overflow-x:auto;padding:10px 12px;background:#fff}
.trending-card{min-width:130px;max-width:180px;cursor:pointer;flex-shrink:0}
.trending-card .img-wrap{position:relative;height:115px;border-radius:10px;overflow:hidden;background:#f4f4f5}
.trending-card .img-wrap img{width:100%;height:100%;object-fit:cover}
.trending-card .tag{position:absolute;bottom:0;left:0;right:0;padding:3px 8px;font-size:.65rem;font-weight:700;color:#fff}
.trending-card .price{font-size:.78rem;font-weight:700;color:#dc2626;margin-top:4px}
.trending-card .stat{font-size:.68rem;color:#a1a1aa}

/* ── Section ── */
.section{background:#fff;margin-top:4px;padding:12px}
.section-title{font-size:.92rem;font-weight:800;color:#18181b}
.section-count{font-size:.7rem;color:#a1a1aa;font-weight:400;margin-left:6px}

/* ── Product Grid ── */
.prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
@media(min-width:640px){.prod-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.prod-grid{grid-template-columns:repeat(4,1fr)}}
.prod-card{border:1px solid #f4f4f5;border-radius:10px;overflow:hidden;background:#fff;cursor:pointer;transition:box-shadow .2s}
.prod-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.prod-card .img-box{position:relative;height:100px;overflow:hidden;background:#f9fafb}
.prod-card .img-box img{width:100%;height:100%;object-fit:cover}
.prod-card .img-count{position:absolute;right:4px;top:4px;background:rgba(0,0,0,.5);color:#fff;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:4px}
.prod-card .condition-tag{position:absolute;left:4px;top:4px;background:rgba(16,185,129,.8);color:#fff;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:4px}
.prod-card .tag-overlay{position:absolute;bottom:0;left:0;right:0;padding:3px 8px;font-size:.6rem;font-weight:700;color:#fff}
.prod-card .info{padding:8px}
.prod-card .info .name{font-size:.72rem;color:#3f3f46;line-height:1.3;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.prod-card .info .price{font-size:.78rem;font-weight:700;color:#dc2626;margin-top:2px}
.prod-card .info .meta{font-size:.62rem;color:#a1a1aa;margin-top:1px}

/* ── Secured Trading ── */
.secured-row{display:flex;align-items:center;justify-content:space-between;background:#fff;margin-top:4px;padding:14px 12px}
.secured-row h3{font-size:.92rem;font-weight:800}
.secured-row p{font-size:.72rem;color:#71717a;margin-top:2px}

/* ── Hotel / Transport cards ── */
.h-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.h-card{min-width:165px;max-width:220px;flex-shrink:0;border:1px solid #f4f4f5;border-radius:10px;overflow:hidden;background:#fff}
.h-card .h-img{height:95px;overflow:hidden;position:relative}
.h-card .h-img img{width:100%;height:100%;object-fit:cover}
.h-card .h-body{padding:8px}
.h-card .h-body .h-name{font-size:.78rem;font-weight:700;color:#18181b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-card .h-body .h-loc{font-size:.68rem;color:#71717a}
.h-card .h-body .h-price{font-size:.82rem;font-weight:700;color:#dc2626;margin-top:4px}
.badge-overlay{position:absolute;padding:3px 8px;border-radius:12px;font-size:.62rem;font-weight:700}

/* ── Sell CTA ── */
.sell-cta{margin:4px 12px 8px;border-radius:16px;padding:22px 20px;color:#fff;position:relative;overflow:hidden;background:linear-gradient(135deg,#1a0533,#2d1065,#0d3f8f)}
.sell-cta .glow1{position:absolute;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.05);top:-24px;right:-24px;filter:blur(40px)}
.sell-cta .glow2{position:absolute;width:100px;height:100px;border-radius:50%;background:rgba(245,166,35,.1);bottom:-30px;left:-30px;filter:blur(40px)}
.sell-cta h2{font-size:1.1rem;font-weight:800;margin-top:8px}
.sell-cta p{font-size:.78rem;color:rgba(255,255,255,.7);margin-top:6px;max-width:280px;line-height:1.5}
.sell-cta .btns{display:flex;gap:10px;margin-top:14px;align-items:center}
.sell-cta .btn-sell{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#f59e0b,#f97316);color:#000;font-weight:800;padding:10px 20px;border-radius:24px;font-size:.82rem;text-decoration:none;box-shadow:0 4px 16px rgba(249,115,22,.25);transition:all .2s;border:none;cursor:pointer}
.sell-cta .btn-sell:hover{filter:brightness(1.1);box-shadow:0 6px 24px rgba(249,115,22,.35)}
.sell-cta .btn-verify{border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);padding:8px 16px;border-radius:24px;font-size:.72rem;font-weight:700;text-decoration:none;transition:all .2s}
.sell-cta .btn-verify:hover{background:rgba(255,255,255,.1)}

/* ── Bottom Nav ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:#fff;border-top:1px solid #e4e4e7;display:flex;align-items:center;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,4px)}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;font-size:.6rem;font-weight:600;color:#a1a1aa;position:relative}
.bottom-nav a.active{color:#f97316}
.bottom-nav a svg{width:22px;height:22px}
.bottom-nav .sell-btn{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#f97316,#f59e0b);display:flex;align-items:center;justify-content:center;margin-top:-18px;box-shadow:0 4px 16px rgba(249,115,22,.3);transition:transform .2s}
.bottom-nav .sell-btn:hover{transform:scale(1.05)}
.bottom-nav .sell-btn svg{width:26px;height:26px;color:#fff}
.bottom-nav .msg-badge{position:absolute;top:-2px;right:-4px;background:#ef4444;color:#fff;width:16px;height:16px;border-radius:50%;font-size:.55rem;font-weight:800;display:flex;align-items:center;justify-content:center}

/* ── Modal ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;justify-content:center;align-items:flex-end}
.modal-bg.open{display:flex}
.modal-box{background:#fff;border-radius:16px 16px 0 0;max-height:92vh;width:100%;max-width:640px;overflow-y:auto;position:relative}
@media(min-width:640px){.modal-box{border-radius:16px;margin:auto}}
.modal-box .close-btn{position:absolute;right:12px;top:12px;z-index:10;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.4);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-box .carousel{position:relative;height:280px;overflow:hidden;background:#f4f4f5}
.modal-box .carousel img{width:100%;height:100%;object-fit:cover}
.modal-box .carousel .nav-arrow{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.4);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-box .carousel .nav-arrow.left{left:8px}
.modal-box .carousel .nav-arrow.right{right:8px}
.modal-box .thumbs{display:flex;gap:6px;padding:8px 12px;overflow-x:auto}
.modal-box .thumbs button{width:52px;height:52px;border-radius:8px;overflow:hidden;flex-shrink:0;border:2px solid transparent;cursor:pointer;padding:0}
.modal-box .thumbs button.active{border-color:#f97316}
.modal-box .thumbs button img{width:100%;height:100%;object-fit:cover}
.modal-box .detail{padding:16px}
.modal-box .detail .badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.68rem;font-weight:700;margin-right:4px;margin-bottom:6px}
.modal-box .detail h2{font-size:1.1rem;font-weight:800;color:#18181b}
.modal-box .detail .seller{font-size:.78rem;color:#71717a;margin-top:2px}
.modal-box .detail .price-row{margin-top:12px;display:flex;align-items:baseline;gap:8px}
.modal-box .detail .price-row .price{font-size:1.5rem;font-weight:800;color:#dc2626}
.modal-box .detail .desc{font-size:.82rem;color:#52525b;margin-top:12px;line-height:1.6}
.modal-box .detail .trust-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px;text-align:center}
.modal-box .detail .trust-grid div{background:#f9fafb;border-radius:10px;padding:10px 4px}
.modal-box .detail .trust-grid .t-label{font-size:.72rem;font-weight:700;color:#3f3f46}
.modal-box .detail .trust-grid .t-sub{font-size:.62rem;color:#a1a1aa}
.modal-box .detail .action-btns{display:flex;gap:8px;margin-top:16px}
.modal-box .detail .action-btns button{flex:1;padding:14px;border-radius:12px;font-weight:700;font-size:.88rem;cursor:pointer;font-family:inherit;border:none;transition:all .2s}
.modal-box .detail .action-btns .buy-btn{background:#f97316;color:#fff}
.modal-box .detail .action-btns .buy-btn:hover{background:#ea580c}
.modal-box .detail .action-btns .msg-btn{background:#fff;color:#f97316;border:2px solid #f97316}
.modal-box .detail .action-btns .msg-btn:hover{background:#fff7ed}

/* Transport */
.trans-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
@media(min-width:640px){.trans-grid{grid-template-columns:repeat(3,1fr)}}
.trans-card{border:1px solid #f4f4f5;border-radius:10px;padding:10px;background:#fff}
.trans-card .icon-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.trans-card .icon{font-size:1.2rem}
.trans-card .t-badge{font-size:.58rem;font-weight:700;padding:2px 8px;border-radius:12px}
.trans-card .t-name{font-size:.78rem;font-weight:700;color:#18181b}
.trans-card .t-desc{font-size:.62rem;color:#71717a;line-height:1.3}
.trans-card .t-price{font-size:.78rem;font-weight:700;color:#dc2626;margin-top:4px}

/* Bills */
.bill-card{display:flex;align-items:center;gap:8px;border:1px solid #f4f4f5;border-radius:10px;padding:10px;background:#fff}
.bill-card .b-icon{font-size:1.2rem}
.bill-card .b-name{font-size:.72rem;font-weight:700;color:#18181b}
.bill-card .b-desc{font-size:.6rem;color:#71717a}

/* Single Purchase Ease */
.ease-section{display:flex;align-items:stretch;background:#fff;margin-top:4px;overflow:hidden}
.ease-section .ease-text{flex:1;padding:16px}
.ease-section .ease-text h2{font-size:1rem;font-weight:800;color:#18181b}
.ease-section .ease-text ul{list-style:none;margin-top:8px}
.ease-section .ease-text li{font-size:.78rem;color:#52525b;display:flex;align-items:center;gap:6px;margin-bottom:4px}
.ease-section .ease-img{width:120px;flex-shrink:0;background:linear-gradient(135deg,#fff7ed,#fffbeb)}
.ease-section .ease-img img{width:100%;height:100%;object-fit:cover}
</style>

var activeTab = "All";

// ── Fetch live products from backend ──
(function loadLiveProducts() {
  fetch('backend/list_products.php')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success && Array.isArray(data.products)) {
        liveProducts = data.products;
        render();
      }
    })
    .catch(function() { /* backend offline */ });
})();

// ── HELPERS ──
function esc(s) { if (s == null) return ""; var d = document.createElement("div"); d.textContent = String(s); return d.innerHTML; }
function doSearch() { var input = document.getElementById('searchInput'); search = input ? input.value : ''; render(); }

/* ══════════════════════════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════════════════════════ */
function render() {
  var q = search.toLowerCase();
  var filtered = marketProducts.filter(function(p) {
    var matchTab = activeTab === "All" || p.category === activeTab;
    var matchSearch = !q || p.title.toLowerCase().indexOf(q) !== -1;
    return matchTab && matchSearch;
  });
  var showHotels = activeTab === "All" || activeTab === "Hotels";
  var showTransport = activeTab === "All" || activeTab === "Transport";
  var showBills = activeTab === "All" || activeTab === "Bills";

  // Category tabs
  var tabsHtml = '';
  allCategories.forEach(function(tab) {
    tabsHtml += '<button onclick="setTab(\'' + tab.replace(/'/g, "\\'") + '\')" class="' + (tab === activeTab ? 'active' : '') + '">' + esc(tab) + '</button>';
  });
  document.getElementById('catTabs').innerHTML = tabsHtml;

  var html = '';

  // ── Trending Row ──
  if (activeTab === "All" && !search) {
    var tagged = marketProducts.filter(function(p) { return p.tag; });
    html += '<div class="trending-row hide-scrollbar">';
    tagged.forEach(function(p) {
      html += '<div class="trending-card" onclick="openModal(\'' + p.id + '\')">' +
        '<div class="img-wrap"><img src="' + p.image + '" alt="' + esc(p.title) + '" loading="lazy">' +
        (p.tag ? '<div class="tag" style="background:' + p.tagColor + '">' + esc(p.tag) + '</div>' : '') +
        '</div><div class="price">' + esc(p.price) + (p.priceHigh ? '-' + esc(p.priceHigh) : '') + '</div>' +
        '<div class="stat">' + esc(p.stat) + '</div></div>';
    });
    html += '</div>';
  }

  // ── Secured Trading Service ──
  if (activeTab === "All" && !search) {
    html += '<div class="secured-row"><div><h3>Secured Trading Service</h3><p>Money safe \u00B7 Multiple payments \u00B7 Online support</p></div>' +
      '<svg width="16" height="16" fill="none" stroke="#a1a1aa" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></div>';
  }

  // ── All Products Grid ──
  if (filtered.length > 0) {
    html += '<div class="section"><div class="section-title">' + (activeTab === "All" ? "All Products" : esc(activeTab)) +
      '<span class="section-count">(' + filtered.length + ')</span></div><div class="prod-grid">';
    filtered.forEach(function(item) {
      html += '<div class="prod-card" onclick="openModal(\'' + item.id + '\')">' +
        '<div class="img-box"><img src="' + item.images[0] + '" alt="' + esc(item.title) + '" loading="lazy">' +
        '<span class="img-count">1/' + item.images.length + '</span>' +
        (item.tag ? '<div class="tag-overlay" style="background:' + item.tagColor + '">' + esc(item.tag) + '</div>' : '') +
        '</div><div class="info"><div class="name">' + esc(item.title) + '</div>' +
        '<div class="price">' + esc(item.price) + (item.priceHigh ? '-' + esc(item.priceHigh) : '') + '</div>' +
        (item.stat ? '<div class="meta">' + esc(item.stat) + '</div>' : '') +
        '</div></div>';
    });
    html += '</div></div>';
  }

  // ── Live Products from Backend ──
  if (liveProducts.length > 0) {
    var fLive = liveProducts.filter(function(p) {
      var matchTab = activeTab === 'All' || p.category === activeTab;
      var matchSearch = !q || p.name.toLowerCase().indexOf(q) !== -1;
      return matchTab && matchSearch;
    });
    if (fLive.length > 0) {
      html += '<div class="section"><div style="display:flex;align-items:center;justify-content:space-between">' +
        '<div class="section-title">\uD83C\uDF1F Pioneer Listings <span class="section-count">(' + fLive.length + ')</span></div>' +
        '<span style="background:#d1fae5;color:#065f46;font-size:.6rem;font-weight:700;padding:3px 10px;border-radius:12px">LIVE</span></div>' +
        '<div class="prod-grid">';
      fLive.forEach(function(item) {
        var imgSrc = item.image1 ? (item.image1.indexOf('http') === 0 ? item.image1 : 'backend/' + item.image1) : 'https://via.placeholder.com/400x300?text=No+Image';
        var imgCount = [item.image1,item.image2,item.image3,item.image4,item.image5,item.image6].filter(Boolean).length;
        html += '<div class="prod-card" onclick="openLiveModal(' + item.id + ')">' +
          '<div class="img-box"><img src="' + imgSrc + '" alt="' + esc(item.name) + '" loading="lazy">' +
          '<span class="img-count">' + imgCount + ' pic' + (imgCount !== 1 ? 's' : '') + '</span>' +
          (item.condition ? '<span class="condition-tag">' + esc(item.condition) + '</span>' : '') +
          '</div><div class="info"><div class="name">' + esc(item.name) + '</div>' +
          '<div class="price">\u03C0' + esc(item.price) + '</div>' +
          '<div class="meta">' + esc(item.category) + ' \u00B7 ' + esc(item.seller_name || 'Pioneer') + '</div>' +
          '</div></div>';
      });
      html += '</div></div>';
    }
  }

  // ── Hotels ──
  if (showHotels) {
    var fHotels = hotels.filter(function(h) { return !q || h.name.toLowerCase().indexOf(q) !== -1 || h.location.toLowerCase().indexOf(q) !== -1; });
    if (fHotels.length > 0) {
      html += '<div class="section"><div class="section-title">\uD83C\uDFE8 Hotels <span class="section-count">(' + fHotels.length + ')</span></div>' +
        '<div class="h-scroll hide-scrollbar" style="margin-top:8px">';
      fHotels.forEach(function(h) {
        html += '<div class="h-card"><div class="h-img"><img src="' + h.image + '" alt="' + esc(h.name) + '" loading="lazy">' +
          '<span class="badge-overlay" style="left:6px;top:6px;background:rgba(0,0,0,.6);color:#fff;text-transform:capitalize">' + esc(h.type) + '</span>' +
          '<span class="badge-overlay" style="right:6px;top:6px;background:#f59e0b;color:#000">\u2605 ' + h.rating + '</span>' +
          '</div><div class="h-body"><div class="h-name">' + esc(h.name) + '</div>' +
          '<div class="h-loc">\uD83D\uDCCD ' + esc(h.location) + '</div>' +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">' +
          '<span class="h-price">' + h.pricePerNight + ' \u03C0</span>' +
          '<span style="background:#f97316;color:#fff;padding:3px 10px;border-radius:6px;font-size:.68rem;font-weight:700;cursor:pointer">Book</span>' +
          '</div></div></div>';
      });
      html += '</div></div>';
    }
  }

  // ── Transport & Delivery ──
  if (showTransport) {
    html += '<div class="section"><div class="section-title">\uD83D\uDE97 Transport & Delivery</div><div class="trans-grid">';
    transportServices.forEach(function(s) {
      var badgeBg = s.badge === 'Popular' ? '#fef3c7;color:#92400e' : s.badge === 'Premium' ? '#ede9fe;color:#6d28d9' : '#d1fae5;color:#065f46';
      html += '<div class="trans-card"><div class="icon-row"><span class="icon">' + s.icon + '</span>' +
        (s.badge ? '<span class="t-badge" style="background:' + badgeBg + '">' + esc(s.badge) + '</span>' : '') +
        '</div><div class="t-name">' + esc(s.name) + '</div><div class="t-desc">' + esc(s.desc) + '</div><div class="t-price">' + esc(s.price) + '</div></div>';
    });
    html += '</div></div>';
  }

  // ── Bills ──
  if (showBills) {
    var fBills = billProviders.filter(function(b) { return !q || b.name.toLowerCase().indexOf(q) !== -1; });
    if (fBills.length > 0) {
      html += '<div class="section"><div class="section-title">\uD83D\uDCB3 Pay Bills <span class="section-count">(' + fBills.length + ')</span></div><div class="prod-grid">';
      fBills.forEach(function(b) {
        html += '<div class="bill-card"><span class="b-icon">' + b.icon + '</span><div><div class="b-name">' + esc(b.name) + '</div><div class="b-desc">' + esc(b.description) + '</div></div></div>';
      });
      html += '</div></div>';
    }
  }

  // ── Single Purchase Ease ──
  if (activeTab === "All" && !search) {
    html += '<div class="ease-section"><div class="ease-text"><h2>Single Purchase Ease</h2><ul>' +
      '<li><svg width="14" height="14" fill="#22c55e" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>Bulk Flexibility</li>' +
      '<li><svg width="14" height="14" fill="#22c55e" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>Certified Sellers</li>' +
      '<li><svg width="14" height="14" fill="#22c55e" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>Secure Pi Trading</li>' +
      '</ul></div><div class="ease-img"><img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?q=80&w=400&auto=format&fit=crop" alt="Secure" loading="lazy"></div></div>';
  }

  // ── Sell CTA ──
  html += '<div class="sell-cta"><div class="glow1"></div><div class="glow2"></div>' +
    '<div style="position:relative;z-index:1">' +
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="display:flex;width:32px;height:32px;align-items:center;justify-content:center;background:rgba(255,255,255,.1);border-radius:8px;font-size:1rem">\uD83D\uDCB0</span>' +
    '<span style="background:rgba(255,255,255,.1);padding:3px 10px;border-radius:12px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1px">Pi Commerce</span></div>' +
    '<h2>Sell Your Product for Pi</h2>' +
    '<p>Post your item, chat with buyers, and accept Pi cryptocurrency securely through our marketplace.</p>' +
    '<div class="btns"><a href="Submit.html" class="btn-sell">\uD83D\uDE80 Sell Now</a><a href="form.html?redirect=Submit.html" class="btn-verify">Get Verified</a></div>' +
    '</div></div>';

  html += '<div style="height:16px"></div>';
  document.getElementById('app').innerHTML = html;

  // Re-bind search
  var si = document.getElementById('searchInput');
  if (si) {
    si.value = search;
    si.addEventListener('input', function() { search = this.value; render(); });
  }
}

function setTab(tab) { activeTab = tab; render(); }

/* ══════════════════════════════════════════════════════════════
   MODAL — Static products
   ══════════════════════════════════════════════════════════════ */
function openModal(id) {
  selectedProduct = marketProducts.find(function(p) { return p.id === id; });
  if (!selectedProduct) return;
  modalImgIdx = 0;
  renderModal();
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
  selectedProduct = null;
}
function setModalImg(i) { modalImgIdx = i; renderModal(); }
function nextModalImg() { if (!selectedProduct) return; modalImgIdx = (modalImgIdx + 1) % selectedProduct.images.length; renderModal(); }
function prevModalImg() { if (!selectedProduct) return; modalImgIdx = (modalImgIdx - 1 + selectedProduct.images.length) % selectedProduct.images.length; renderModal(); }

function renderModal() {
  var p = selectedProduct;
  if (!p) return;
  var imgs = p.images;
  var h = '';
  h += '<button class="close-btn" onclick="closeModal()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>';
  h += '<div class="carousel"><img src="' + imgs[modalImgIdx] + '" alt="' + esc(p.title) + '">';
  h += '<button class="nav-arrow left" onclick="event.stopPropagation();prevModalImg()"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>';
  h += '<button class="nav-arrow right" onclick="event.stopPropagation();nextModalImg()"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></button>';
  h += '<span style="position:absolute;right:12px;top:12px;background:rgba(0,0,0,.5);color:#fff;padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:700">' + (modalImgIdx + 1) + '/' + imgs.length + '</span></div>';
  h += '<div class="thumbs hide-scrollbar">';
  imgs.forEach(function(src, i) {
    h += '<button onclick="event.stopPropagation();setModalImg(' + i + ')" class="' + (i === modalImgIdx ? 'active' : '') + '"><img src="' + src + '" alt="Thumb"></button>';
  });
  h += '</div>';
  h += '<div class="detail">';
  if (p.tag) h += '<span class="badge" style="background:#fff7ed;color:#c2410c">' + esc(p.tag) + '</span>';
  h += '<span class="badge" style="background:#f3f4f6;color:#374151">' + esc(p.category) + '</span>';
  h += '<h2>' + esc(p.title) + '</h2>';
  h += '<div class="seller">' + esc(p.category) + ' \u00B7 ' + esc(p.stat) + '</div>';
  h += '<div class="price-row"><span class="price">' + esc(p.price) + '</span>';
  if (p.priceHigh) h += '<span style="color:#a1a1aa;font-size:.88rem"> \u2013 ' + esc(p.priceHigh) + '</span>';
  h += '<span style="color:#a1a1aa;font-size:.72rem;margin-left:4px">GCV</span></div>';
  h += '<div class="trust-grid"><div><div class="t-label">Pi Secured</div><div class="t-sub">Safe Trade</div></div><div><div class="t-label">Verified</div><div class="t-sub">Seller</div></div><div><div class="t-label">Global</div><div class="t-sub">Shipping</div></div></div>';
  h += '<div class="action-btns"><button class="buy-btn">\u03C0 Buy Now (' + esc(p.price) + ')</button><button class="msg-btn">Add to Cart</button></div>';
  h += '</div>';
  document.getElementById('modal-content').innerHTML = h;
}

/* ══════════════════════════════════════════════════════════════
   MODAL — Live products from backend
   ══════════════════════════════════════════════════════════════ */
function openLiveModal(id) {
  var p = liveProducts.find(function(x) { return x.id == id; });
  if (!p) return;
  var imgs = [p.image1, p.image2, p.image3, p.image4, p.image5, p.image6].filter(Boolean).map(function(src) {
    return src.indexOf('http') === 0 ? src : 'backend/' + src;
  });
  if (imgs.length === 0) imgs = ['https://via.placeholder.com/600x400?text=No+Image'];
  var h = '';
  h += '<button class="close-btn" onclick="closeModal()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>';
  h += '<div class="carousel"><img id="live-img" src="' + imgs[0] + '" alt="' + esc(p.name) + '">';
  h += '<span style="position:absolute;right:12px;top:12px;background:rgba(0,0,0,.5);color:#fff;padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:700">1/' + imgs.length + '</span></div>';
  if (imgs.length > 1) {
    h += '<div class="thumbs hide-scrollbar">';
    imgs.forEach(function(src, i) {
      h += '<button onclick="event.stopPropagation();document.getElementById(\'live-img\').src=\'' + src + '\'" class="' + (i === 0 ? 'active' : '') + '"><img src="' + src + '" alt="Thumb"></button>';
    });
    h += '</div>';
  }
  h += '<div class="detail">';
  if (p.condition) h += '<span class="badge" style="background:#d1fae5;color:#065f46">' + esc(p.condition) + '</span>';
  h += '<span class="badge" style="background:#ede9fe;color:#6d28d9">' + esc(p.category) + '</span>';
  h += '<h2>' + esc(p.name) + '</h2>';
  h += '<div class="seller">by ' + esc(p.seller_name || 'Pioneer') + '</div>';
  h += '<div class="price-row"><span class="price">\u03C0' + esc(p.price) + '</span><span style="color:#a1a1aa;font-size:.72rem;margin-left:6px">Pi</span></div>';
  if (p.description) h += '<div class="desc">' + esc(p.description) + '</div>';
  h += '<div class="trust-grid"><div><div class="t-label">Pi Secured</div><div class="t-sub">Safe Trade</div></div><div><div class="t-label">KYC Verified</div><div class="t-sub">Seller</div></div><div><div class="t-label">Escrow</div><div class="t-sub">Protected</div></div></div>';
  h += '<div class="action-btns"><button class="buy-btn">\u03C0 Buy Now</button><button class="msg-btn">Message Seller</button></div>';
  h += '</div>';
  document.getElementById('modal-content').innerHTML = h;
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

// Keyboard
document.addEventListener('keydown', function(e) {
  if (!selectedProduct) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') prevModalImg();
  if (e.key === 'ArrowRight') nextModalImg();
});

/* ── Pi SDK Integration ── */
var isPiBrowser = /PiBrowser/i.test(navigator.userAgent) || typeof window.Pi !== 'undefined';
function setConnectedState(username) {
  var el = document.getElementById('pi-handle');
  if (el) el.textContent = '@' + username;
  var el2 = document.getElementById('pi-username-display');
  if (el2) el2.textContent = '@' + username;
}
function restoreConnectedState() {
  var u = sessionStorage.getItem('piUser');
  if (u) { var user = JSON.parse(u); setConnectedState(user.username); return true; }
  return false;
}
(function() {
  if (!restoreConnectedState() && isPiBrowser && window.Pi) {
    try {
      Pi.init({ version: '2.0', sandbox: /^(localhost|127\.0\.0\.1)$/i.test(window.location.hostname) });
      Pi.authenticate(['username','payments'], {
        onIncompletePaymentFound: function() {}
      }).then(function(auth) {
        setConnectedState(auth.user.username);
        sessionStorage.setItem('piUser', JSON.stringify(auth.user));
      }).catch(function() {});
    } catch(e) {}
  }
})();

// ── INIT ──
render();
</script>
<script src="clear-button.js"></script>
</body>
