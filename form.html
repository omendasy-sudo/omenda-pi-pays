<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYC Verification | Omenda Pi Pays</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #f4f4f5; color: #18181b; }
    .kyc-container { max-width: 480px; margin: 40px auto; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); padding: 32px; }
    h2 { font-size: 2rem; font-weight: 700; margin-bottom: 18px; }
    .kyc-form label { font-weight: 500; margin-bottom: 6px; display: block; }
    .kyc-form input, .kyc-form select { width: 100%; padding: 10px; margin-bottom: 16px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; }
    .kyc-form button { background: #7c3aed; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
    .kyc-form button:hover { background: #5b21b6; }
    .kyc-form .note { font-size: 0.9rem; color: #52525b; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="kyc-container">
    <h2>KYC Verification</h2>
    <form class="kyc-form" action="#" method="post">
            <hr style="margin:32px 0;">
            <h3>Business Location</h3>
            <div class="note">Pin your business location on the map below. The coordinates will be saved automatically.</div>
            <div id="business-map" style="width:100%;height:320px;margin-bottom:18px;border-radius:12px;overflow:hidden;border:1px solid #ddd;"></div>
            <button type="button" id="pin-location-btn" style="background:#22c55e;color:#fff;padding:10px 18px;border-radius:8px;font-weight:600;margin-bottom:16px;">Pin Business Location</button>
            <label for="business_address">Business Address</label>
            <input type="text" id="business_address" name="business_address" placeholder="Enter business address or coordinates">
            <input type="hidden" id="business_latlng" name="business_latlng">
      <div class="note">Please fill in your details for Know Your Customer (KYC) verification.</div>
      <h3>Personal KYC</h3>
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="idtype">ID Type</label>
      <select id="idtype" name="idtype" required>
        <option value="">Select ID Type</option>
        <option value="passport">Passport</option>
        <option value="national_id">National ID</option>
        <option value="driver_license">Driver's License</option>
      </select>

      <label for="idnumber">ID Number</label>
      <input type="text" id="idnumber" name="idnumber" required>

      <label for="idfile">Upload ID Document</label>
      <input type="file" id="idfile" name="idfile" accept="image/*,application/pdf" required>

      <hr style="margin:32px 0;">
      <h3>Business KYC</h3>
      <label for="business_name">Business Name</label>
      <input type="text" id="business_name" name="business_name">

      <label for="business_reg">Business Registration Number</label>
      <input type="text" id="business_reg" name="business_reg">

      <label for="business_type">Business Type</label>
      <select id="business_type" name="business_type">
        <option value="">Select Business Type</option>
        <option value="sole_proprietor">Sole Proprietor</option>
        <option value="partnership">Partnership</option>
        <option value="limited_company">Limited Company</option>
        <option value="ngo">NGO / Non-Profit</option>
      </select>

      <label for="business_doc">Upload Business Registration Document</label>
      <input type="file" id="business_doc" name="business_doc" accept="image/*,application/pdf">

      <button type="submit" id="kyc-submit-btn">Submit KYC</button>
    </form>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var map = L.map('business-map').setView([0, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);
    var marker;
    document.getElementById('pin-location-btn').onclick = function() {
      map.once('click', function(e) {
        if (marker) map.removeLayer(marker);
        marker = L.marker(e.latlng).addTo(map);
        document.getElementById('business_latlng').value = e.latlng.lat + ',' + e.latlng.lng;
        document.getElementById('business_address').value = 'Lat: ' + e.latlng.lat + ', Lng: ' + e.latlng.lng;
      });
      alert('Click on the map to pin your business location.');
    };

    // AJAX KYC submission
    document.querySelector('.kyc-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var form = e.target;
      var formData = new FormData(form);
      document.getElementById('kyc-submit-btn').disabled = true;
      fetch('backend/kyc_submit.php', {
        method: 'POST',
        body: formData
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          localStorage.setItem('kyc_completed', '1');
          localStorage.setItem('kyc_email', form.querySelector('#email').value);
          alert('KYC submitted successfully!');
          form.reset();
          if (marker) map.removeLayer(marker);
          // Redirect to product posting page if coming from there
          const params = new URLSearchParams(window.location.search);
          if (params.get('redirect')) {
            window.location.href = params.get('redirect');
          }
        } else {
          alert('Submission failed: ' + (data.error || 'Unknown error'));
        }
        document.getElementById('kyc-submit-btn').disabled = false;
      })
      .catch(() => {
        alert('Submission failed. Please try again.');
        document.getElementById('kyc-submit-btn').disabled = false;
      });
    });
  </script>
</body>
</html>
