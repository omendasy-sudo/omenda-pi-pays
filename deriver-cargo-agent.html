<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deriver Cargo Agent | Omenda Pi Pays</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="lang.js"></script>
    <script src="theme.js"></script>
    <script src="pi-browser-links.js"></script>
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-card: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.1);
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --pi-purple: #7c3aed;
            --success: #22c55e;
            --radius: 14px;
            --radius-sm: 10px;
        }
        html.light {
            --bg-primary: #ffffff;
            --bg-card: rgba(0,0,0,0.02);
            --border: rgba(0,0,0,0.08);
            --text-primary: #18181b;
            --text-secondary: #52525b;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .wrap { max-width: 960px; margin: 0 auto; padding: 24px; }
        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .top-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .title { font-size: clamp(1.5rem, 3vw, 2rem); font-weight: 800; }
        .muted { color: var(--text-secondary); }
        .btn {
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn.primary {
            background: var(--pi-purple);
            border-color: var(--pi-purple);
            color: #fff;
        }
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 16px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
        }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 0.8rem; color: var(--text-secondary); }
        .field input, .field select {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            font: inherit;
            outline: none;
        }
        .field input:focus, .field select:focus { border-color: var(--pi-purple); }
        .phone-row {
            display: grid;
            grid-template-columns: minmax(160px, 210px) 1fr;
            gap: 8px;
        }
        .code-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0 10px;
            background: transparent;
        }
        .code-wrap:focus-within { border-color: var(--pi-purple); }
        .code-flag {
            min-width: 24px;
            text-align: center;
            font-size: 1.05rem;
            line-height: 1;
        }
        .code-wrap select {
            border: none;
            background: transparent;
            color: var(--text-primary);
            padding: 10px 0;
            width: 100%;
            outline: none;
            font: inherit;
        }
        .code-wrap select:focus { outline: none; }
        .actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
        .list { display: grid; gap: 8px; margin-top: 10px; }
        .item {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            font-size: 0.88rem;
        }
        .ok { color: var(--success); font-weight: 700; }
        @media (max-width: 760px) {
            .top { flex-direction: column; align-items: flex-start; }
            .top-actions { width: 100%; justify-content: flex-start; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="top">
            <div>
                <div class="title">Deriver Cargo Agent Page</div>
                <div class="muted">Register as a deriver cargo agent and manage applications.</div>
            </div>
            <div class="top-actions">
                <a class="btn" href="index.html">Home</a>
                <a class="btn" href="transport.html">Transport</a>
                <a class="btn" href="https://omendapipaysglobel.online/services" target="_blank" rel="noopener noreferrer">All Services</a>
            </div>
        </div>

        <div class="panel">
            <h3>Deriver Cargo Agent Registration</h3>
            <div class="grid">
                <div class="field">
                    <label>Full Name</label>
                    <input id="full-name" type="text" placeholder="Enter full name">
                </div>
                <div class="field">
                    <label>Phone</label>
                    <div class="phone-row">
                        <div class="code-wrap">
                            <span id="country-flag" class="code-flag" aria-hidden="true">🇰🇪</span>
                            <select id="country-code" aria-label="Country code" onchange="updateCountryFlag()">
                                <option value="+254" data-flag="🇰🇪">+254 Kenya</option>
                                <option value="+255" data-flag="🇹🇿">+255 Tanzania</option>
                                <option value="+256" data-flag="🇺🇬">+256 Uganda</option>
                                <option value="+1" data-flag="🇺🇸">+1 United States</option>
                                <option value="+44" data-flag="🇬🇧">+44 United Kingdom</option>
                                <option value="+91" data-flag="🇮🇳">+91 India</option>
                                <option value="+971" data-flag="🇦🇪">+971 UAE</option>
                                <option value="+" data-flag="🌐">Global</option>
                            </select>
                        </div>
                        <input id="phone" type="tel" placeholder="Phone number">
                    </div>
                </div>
                <div class="field">
                    <label>Email</label>
                    <input id="email" type="email" placeholder="you@example.com">
                </div>
                <div class="field">
                    <label>City / Place</label>
                    <input id="city" type="text" placeholder="Nairobi, Mombasa...">
                </div>
                <div class="field">
                    <label>Vehicle Type</label>
                    <select id="vehicle">
                        <option value="">Select vehicle</option>
                        <option>Motorbike</option>
                        <option>Taxi Sedan</option>
                        <option>SUV</option>
                        <option>Van / Minibus</option>
                        <option>Truck</option>
                    </select>
                </div>
                <div class="field">
                    <label>Plate Number</label>
                    <input id="plate" type="text" placeholder="KDA 123A">
                </div>
                <div class="field">
                    <label>Experience (Years)</label>
                    <input id="experience" type="number" min="0" step="1" placeholder="0">
                </div>
            </div>
            <div class="actions">
                <button class="btn primary" onclick="submitApplication()">Submit Application</button>
                <button class="btn" onclick="clearForm()">Clear</button>
            </div>
            <p id="status" class="muted"></p>
        </div>

        <div class="panel">
            <h3>Recent Deriver Cargo Agent Applications</h3>
            <div id="apps" class="list"></div>
        </div>
    </div>

    <script>
        const KEY = 'omenda_driver_agent_apps';

        function getApps() {
            try {
                const raw = localStorage.getItem(KEY);
                const arr = raw ? JSON.parse(raw) : [];
                return Array.isArray(arr) ? arr : [];
            } catch (e) {
                return [];
            }
        }

        function saveApps(arr) {
            localStorage.setItem(KEY, JSON.stringify(arr));
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function renderApps() {
            const holder = document.getElementById('apps');
            const rows = getApps().slice(-8).reverse();
            if (!rows.length) {
                holder.innerHTML = '<div class="item">No applications yet.</div>';
                return;
            }
            holder.innerHTML = rows.map(function (r) {
                const dt = new Date(Number(r.createdAt || Date.now())).toLocaleString();
                return '<div class="item"><strong>' + esc(r.fullName) + '</strong> | ' + esc(r.city) + ' | ' + esc(r.vehicle) + ' | Plate: ' + esc(r.plate) + '<br><span class="muted">Phone: ' + esc(r.phone) + ' | Email: ' + esc(r.email || '-') + ' | Experience: ' + esc(String(r.experience || '0')) + ' years | ' + esc(dt) + '</span></div>';
            }).join('');
        }

        function updateCountryFlag() {
            var select = document.getElementById('country-code');
            var flagEl = document.getElementById('country-flag');
            if (!select || !flagEl) return;
            var option = select.options[select.selectedIndex];
            flagEl.textContent = option && option.dataset && option.dataset.flag ? option.dataset.flag : '🌐';
        }

        function clearForm() {
            document.getElementById('full-name').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('country-code').value = '+254';
            updateCountryFlag();
            document.getElementById('email').value = '';
            document.getElementById('city').value = '';
            document.getElementById('vehicle').value = '';
            document.getElementById('plate').value = '';
            document.getElementById('experience').value = '';
            document.getElementById('status').textContent = '';
        }

        function submitApplication() {
            const fullName = document.getElementById('full-name').value.trim();
            const countryCode = document.getElementById('country-code').value;
            const phoneRaw = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const city = document.getElementById('city').value.trim();
            const vehicle = document.getElementById('vehicle').value;
            const plate = document.getElementById('plate').value.trim();
            const experience = document.getElementById('experience').value.trim() || '0';

            const normalizedPhone = phoneRaw.replace(/\s+/g, '');
            const phone = (countryCode === '+')
                ? ('+' + normalizedPhone.replace(/^\+/, ''))
                : (countryCode + normalizedPhone.replace(/^0+/, ''));

            if (!fullName || !phoneRaw || !email || !city || !vehicle || !plate) {
                document.getElementById('status').textContent = 'Please fill all required fields.';
                document.getElementById('status').className = 'muted';
                return;
            }

            const apps = getApps();
            apps.push({ fullName, phone, countryCode, phoneRaw, email, city, vehicle, plate, experience, createdAt: Date.now() });
            saveApps(apps);
            clearForm();
            document.getElementById('status').textContent = 'Application submitted successfully.';
            document.getElementById('status').className = 'ok';
            renderApps();
        }

        updateCountryFlag();
        renderApps();
    </script>
    <script src="clear-button.js"></script>
</body>
</html>
