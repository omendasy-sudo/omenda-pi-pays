server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name omendapipaysglobel.online www.omendapipaysglobel.online;
    ssl_certificate     C:/Users/OMENDA/OneDrive/omenda pi pays/certbot/fullchain.pem;
    ssl_certificate_key C:/Users/OMENDA/OneDrive/omenda pi pays/certbot/privkey.pem;
    ssl_trusted_certificate C:/Users/OMENDA/OneDrive/omenda pi pays/certbot/chain.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ─── Pi Browser: HAKUNA X-Frame-Options ────────────────────────────────────
    # X-Frame-Options inasababisha ERR_BLOCKED_BY_RESPONSE kwenye Pi Browser WebView.
    # Badala yake tumia Content-Security-Policy frame-ancestors peke yake.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Content-Security-Policy   "frame-ancestors 'self' https://*.minepi.com https://minepi.com" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    # Ficha X-Frame-Options kama inatoka upstream (Next.js au proxy nyingine)
    proxy_hide_header X-Frame-Options;

    location = /validation-key.txt {
        root C:/Users/OMENDA/OneDrive/omenda pi pays;
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        try_files /validation-key.txt =404;
    }

    location /.well-known/acme-challenge/ {
        root C:/Users/OMENDA/OneDrive/omenda pi pays/certbot;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
        proxy_hide_header  X-Frame-Options;
    }
}
