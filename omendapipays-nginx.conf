    # Localhost development server block
    server {
        listen 80;
        server_name localhost;
        root C:/Users/OMENDA/OneDrive/omenda pi pays;

        # Allow direct access to backend PHP scripts
        location /backend/ {
            alias C:/Users/OMENDA/OneDrive/omenda pi pays/backend/;
            try_files $uri $uri/ =404;

            location ~ ^/backend/(.+\.php)$ {
                fastcgi_pass 127.0.0.1:9000;
                fastcgi_index index.php;
                fastcgi_param SCRIPT_FILENAME C:/Users/OMENDA/OneDrive/omenda pi pays/backend/$1;
                include fastcgi_params;
            }
        }

        # Static files
        location /uploads/ {
            alias C:/Users/OMENDA/OneDrive/omenda pi pays/backend/uploads/;
            try_files $uri $uri/ =404;
        }

        # Remove HTTPS redirect for local
        location / {
            try_files $uri $uri/ =404;
        }
    }
    # Backend PHP handler for product_submit.php and other backend scripts
    location /backend/ {
        alias C:/Users/OMENDA/OneDrive/omenda pi pays/backend/;
        try_files $uri $uri/ =404;

        # Enable PHP for .php files in backend (update fastcgi_pass for Windows PHP CGI)
        location ~ ^/backend/(.+\.php)$ {
            fastcgi_pass 127.0.0.1:9000; # Update to your PHP CGI/FastCGI port
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME C:/Users/OMENDA/OneDrive/omenda pi pays/backend/$1;
            include fastcgi_params;
        }
    }
server {
    listen 80;
    listen [::]:80;
    server_name omendapipaysglobel.online www.omendapipaysglobel.online;

    location = /validation-key.txt {
        root C:/Users/OMENDA/OneDrive/omenda pi pays;
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        try_files /validation-key.txt =404;
    }

    location /.well-known/acme-challenge/ {
