<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Omenda Pi Pays</title>
    <style>
        :root {
            --bg: #09090b;
            --card: #131317;
            --border: rgba(255,255,255,0.08);
            --text: #f4f4f5;
            --muted: #a1a1aa;
            --purple: #7c3aed;
            --danger: #ef4444;
            --success: #22c55e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Inter, Segoe UI, Arial, sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at top right, rgba(124,58,237,0.18), transparent 40%), var(--bg);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 20px;
        }
        .card {
            width: min(460px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 26px;
        }
        h1 { font-size: 1.45rem; margin-bottom: 8px; }
        p { color: var(--muted); font-size: 0.9rem; margin-bottom: 18px; line-height: 1.5; }
        .field { margin-bottom: 12px; }
        label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 11px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #0f0f13;
            color: var(--text);
            font-size: 0.95rem;
        }
        input:focus { outline: none; border-color: var(--purple); }
        .btn {
            width: 100%;
            border: 0;
            background: var(--purple);
            color: #fff;
            font-weight: 700;
            padding: 11px 12px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 8px;
        }
        .hint {
            margin-top: 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            font-size: 0.82rem;
            color: var(--muted);
        }
        .msg {
            margin-top: 12px;
            font-size: 0.85rem;
            min-height: 20px;
        }
        .msg.error { color: var(--danger); }
        .msg.ok { color: var(--success); }
        .link {
            display: inline-block;
            margin-top: 14px;
            font-size: 0.82rem;
            color: var(--muted);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Admin Login</h1>
        <p>Sign in to access the Omenda admin panel.</p>

        <form id="login-form">
            <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" autocomplete="username" value="omendaonline@gmail.com" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" autocomplete="current-password" value="P.b.o_@1988" required>
            </div>
            <button class="btn" type="submit">Login to Admin Panel</button>
            <div class="msg" id="msg"></div>
        </form>

        <div class="hint">
            Recommended admin email: <strong>omendaonline@gmail.com</strong><br>
            Recommended password: <strong>P.b.o_@1988</strong>
        </div>

        <a class="link" href="index.html">Back to Marketplace</a>
    </main>

    <script>
        (function () {
            "use strict";

            var ADMIN_EMAIL = "omendaonline@gmail.com";
            var ADMIN_PASSWORD = "P.b.o_@1988";
            var KEY = "omenda_admin_auth";
            var TOKEN_KEY = "omenda_admin_token";
            var API_BASE_KEY = "omenda_admin_api_base";
            var DEFAULT_API_BASE = "https://109.199.109.143";
            var ADMIN_API_BASE = sessionStorage.getItem(API_BASE_KEY) || DEFAULT_API_BASE;

            var form = document.getElementById("login-form");
            var msg = document.getElementById("msg");

            function apiUrl(path) {
                return ADMIN_API_BASE ? ADMIN_API_BASE.replace(/\/$/, "") + path : path;
            }

            function setMsg(text, cls) {
                msg.textContent = text;
                msg.className = "msg " + cls;
            }

            if (sessionStorage.getItem(KEY) === "1") {
                window.location.href = "admin-panel.html";
            }

            form.addEventListener("submit", async function (e) {
                e.preventDefault();
                var email = document.getElementById("email").value.trim();
                var password = document.getElementById("password").value;

                setMsg("Checking admin credentials...", "");

                try {
                    var res = await fetch(apiUrl("/api/admin/auth/login"), {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email: email, password: password })
                    });

                    if (res.ok) {
                        var data = await res.json();
                        sessionStorage.setItem(KEY, "1");
                        sessionStorage.setItem(TOKEN_KEY, data && data.token ? data.token : "omenda-admin-session");
                        setMsg("Login successful. Redirecting...", "ok");
                        setTimeout(function () {
                            window.location.href = "admin-panel.html";
                        }, 450);
                        return;
                    }
                } catch (err) {
                    console.warn("Admin API login unavailable, using local fallback.", err);
                }

                // Fallback to local check if API is unavailable.
                if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                    sessionStorage.setItem(KEY, "1");
                    sessionStorage.setItem(TOKEN_KEY, "omenda-admin-local");
                    setMsg("Login successful. Redirecting...", "ok");
                    setTimeout(function () {
                        window.location.href = "admin-panel.html";
                    }, 450);
                    return;
                }

                setMsg("Invalid admin email or password.", "error");
            });
        })();
    </script>
    <script src="clear-button.js"></script>
</body>
</html>
