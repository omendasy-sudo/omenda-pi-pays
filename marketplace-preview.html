(function loadLiveProducts() {

    .then(function(r) { return r.json(); })

// ── HELPERS ──
function esc(s) { if (s == null) return ""; const d = document.createElement("div"); d.textContent = String(s); return d.innerHTML; }

function tagGradientStyle(tagColor) {
  if (!tagColor) return "";
  const map = {
    "from-rose-500/80 to-rose-600/80":"linear-gradient(to top,rgba(244,63,94,.8),rgba(225,29,72,.8))",
    "from-violet-500/80 to-violet-600/80":"linear-gradient(to top,rgba(139,92,246,.8),rgba(124,58,237,.8))",
    "from-amber-500/80 to-amber-600/80":"linear-gradient(to top,rgba(245,158,11,.8),rgba(217,119,6,.8))",
    "from-emerald-500/80 to-emerald-600/80":"linear-gradient(to top,rgba(16,185,129,.8),rgba(5,150,105,.8))"
  };
  return map[tagColor] || "linear-gradient(to top,rgba(100,100,100,.8),rgba(80,80,80,.8))";
}

function badgeClass(badge) {
  if (badge === "Popular") return "bg-amber-100 text-amber-700";
  if (badge === "Premium") return "bg-violet-100 text-violet-700";
  return "bg-green-100 text-green-700";
}

    html += `<h3 class="mb-1.5 mt-3 text-[13px] font-bold text-slate-800">\u2708\uFE0F Flights</h3><div class="flex snap-x gap-2 overflow-x-auto hide-scrollbar">`;
    flights.forEach(f => {
      html += `<div class="min-w-[150px] max-w-[200px] snap-start rounded-lg border border-slate-100 bg-white p-2 shadow-sm">
        <div class="mb-1 flex items-center gap-1.5"><span class="text-base">${f.icon}</span><span class="text-[11px] font-bold text-slate-700">${esc(f.airline)}</span></div>
        <div class="mb-1 flex items-center gap-1 text-[13px] font-extrabold text-slate-900">${esc(f.from)} <span class="text-slate-300">\u2192</span> ${esc(f.to)}</div>
        <p class="text-[9px] text-slate-500">${esc(f.duration)}</p><p class="mt-0.5 text-[13px] font-bold text-rose-600">${esc(f.price)}</p></div>`;
    });
    html += `</div></section>`;
  }

  // ── Bills ──
  if (showBills && fBills.length > 0) {
    html += `<section class="mt-1 bg-white px-2 py-3"><h2 class="mb-2 px-1 text-[15px] font-bold text-slate-900">\uD83D\uDCB3 Pay Bills <span class="text-[11px] font-normal text-slate-400">(${fBills.length})</span></h2>
    <div class="grid grid-cols-2 gap-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5">`;
    fBills.forEach(b => {
      html += `<div class="flex items-center gap-2 rounded-lg border border-slate-100 bg-white p-2 shadow-sm">
        <span class="text-lg">${b.icon}</span><div class="min-w-0"><p class="text-[11px] font-bold text-slate-800 truncate">${esc(b.name)}</p><p class="text-[9px] text-slate-500 truncate">${esc(b.description)}</p></div></div>`;
    });
    html += `</div></section>`;
  }

  // ── Single Purchase Ease ──
  if (activeTab === "All" && !search) {
    html += `<section class="mt-1 flex items-stretch gap-0 overflow-hidden bg-white">
      <div class="flex flex-1 flex-col justify-center px-4 py-4">
        <h2 class="text-[16px] font-extrabold text-slate-900">Single Purchase Ease</h2>
        <ul class="mt-1.5 space-y-0.5 text-[12px] text-slate-600">
          <li class="flex items-center gap-1.5"><svg class="h-3 w-3 text-emerald-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>Bulk Flexibility</li>
          <li class="flex items-center gap-1.5"><svg class="h-3 w-3 text-emerald-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>Certified Sellers</li>
          <li class="flex items-center gap-1.5"><svg class="h-3 w-3 text-emerald-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>Secure Pi Trading</li>
        </ul></div>
      <div class="w-[120px] shrink-0 bg-gradient-to-br from-orange-50 to-amber-50"><img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?q=80&w=400&auto=format&fit=crop" alt="Secure trading" class="h-full w-full object-cover" loading="lazy"/></div>
    </section>`;
  }

  // ── Sell CTA ──
  html += `<section class="mt-1 bg-white px-3 py-3"><div class="relative overflow-hidden rounded-2xl bg-gradient-to-br from-[#1a0533] via-[#2d1065] to-[#0d3f8f] p-5 text-white">
    <div class="absolute -right-6 -top-6 h-32 w-32 rounded-full bg-white/5 blur-2xl"></div>
    <div class="absolute -bottom-8 -left-8 h-28 w-28 rounded-full bg-amber-400/10 blur-2xl"></div>
    <div class="relative z-10">
      <div class="mb-2 flex items-center gap-2"><span class="flex h-8 w-8 items-center justify-center rounded-lg bg-white/10 text-base">\uD83D\uDCB0</span><span class="rounded-full bg-white/10 px-2 py-0.5 text-[10px] font-bold uppercase tracking-wider">Pi Commerce</span></div>
      <h2 class="text-lg font-extrabold tracking-tight">Sell Your Product for Pi</h2>
      <p class="mt-1 max-w-[280px] text-[12px] leading-relaxed text-white/70">Post your item, chat with buyers, and accept Pi cryptocurrency securely through our marketplace.</p>
      <div class="mt-3 flex items-center gap-3">
        <a href="Submit.html" class="inline-flex items-center gap-1.5 rounded-full bg-gradient-to-r from-amber-400 to-orange-500 px-4 py-2 text-xs font-extrabold text-black shadow-lg shadow-orange-500/25 transition hover:shadow-orange-500/40 hover:brightness-110">\uD83D\uDE80 Sell Now</a>
        <a href="form.html?redirect=Submit.html" class="rounded-full border border-white/20 px-3 py-1.5 text-[11px] font-bold text-white/80 transition hover:bg-white/10">Get Verified</a>
      </div>
    </div>
  </div></section>`;

  // ── Live Products from Backend ──
  if (liveProducts.length > 0) {
    const fLive = liveProducts.filter(p => {
      const matchTab = activeTab === 'All' || p.category === activeTab;
      const matchSearch = !q || p.name.toLowerCase().includes(q);
      return matchTab && matchSearch;
    });
    if (fLive.length > 0) {
      html += `<section class="mt-1 bg-white px-2 py-3">
        <div class="mb-2 flex items-center justify-between px-1"><h2 class="text-[15px] font-bold text-slate-900">\uD83C\uDF1F Pioneer Listings <span class="ml-1 text-[11px] font-normal text-slate-400">(${fLive.length})</span></h2><span class="rounded-full bg-emerald-50 px-2 py-0.5 text-[9px] font-bold text-emerald-600">LIVE</span></div>
        <div class="grid grid-cols-2 gap-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6">`;
      fLive.forEach(item => {
        const imgSrc = item.image1 ? (item.image1.startsWith('http') ? item.image1 : 'backend/' + item.image1) : 'https://via.placeholder.com/400x300?text=No+Image';
        const imgCount = [item.image1,item.image2,item.image3,item.image4,item.image5,item.image6].filter(Boolean).length;
        html += `<article class="cursor-pointer overflow-hidden rounded-lg border border-slate-100 bg-white shadow-sm transition-shadow hover:shadow-md" onclick="openLiveModal(${item.id})">
          <div class="relative h-[95px] overflow-hidden bg-slate-50">
            <img src="${imgSrc}" alt="${esc(item.name)}" class="h-full w-full object-cover" loading="lazy"/>
            <span class="absolute right-1 top-1 rounded bg-black/50 px-1 py-0.5 text-[8px] font-bold text-white">${imgCount} pic${imgCount!==1?'s':''}</span>
            ${item.condition ? `<span class="absolute left-1 top-1 rounded bg-emerald-500/80 px-1 py-0.5 text-[8px] font-bold text-white">${esc(item.condition)}</span>` : ''}
          </div>
          <div class="p-1.5">
            <p class="line-clamp-1 text-[11px] leading-tight text-slate-700">${esc(item.name)}</p>
            <p class="mt-0.5 text-[12px] font-bold text-rose-600">\u03C0${esc(item.price)}</p>
            <p class="text-[9px] text-slate-400">${esc(item.category)} \u00B7 ${esc(item.seller_name || 'Pioneer')}</p>
          </div></article>`;
      });
      html += `</div></section>`;
    }
  }

  // Footer space
  html += `<div class="h-4"></div>`;

  document.getElementById("app").innerHTML = html;

  // Bind search
  const si = document.getElementById("searchInput");
  if (si) {
    si.addEventListener("input", function() { search = this.value; render(); });
    // Restore cursor position
    si.focus();
    si.setSelectionRange(si.value.length, si.value.length);
  }
}

function setTab(tab) { activeTab = tab; render(); }

// ── MODAL ──
function openModal(id) {
  selectedProduct = marketProducts.find(p => p.id === id);
  if (!selectedProduct) return;
  modalImgIdx = 0;
  renderModal();
  document.getElementById("modal-overlay").classList.remove("hidden");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal-overlay").classList.add("hidden");
  document.body.style.overflow = "";
  selectedProduct = null;
}

function setModalImg(i) { modalImgIdx = i; renderModal(); }
function nextModalImg() { if (!selectedProduct) return; modalImgIdx = (modalImgIdx + 1) % selectedProduct.images.length; renderModal(); }
function prevModalImg() { if (!selectedProduct) return; modalImgIdx = (modalImgIdx - 1 + selectedProduct.images.length) % selectedProduct.images.length; renderModal(); }

function renderModal() {
  const p = selectedProduct;
  if (!p) return;
  const imgs = p.images;
  let h = "";

  // Close button
  h += `<button onclick="closeModal()" class="absolute right-3 top-3 z-10 flex h-8 w-8 items-center justify-center rounded-full bg-black/40 text-white backdrop-blur-sm hover:bg-black/60 transition">
    <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>`;

  // Image carousel
  h += `<div class="relative h-[280px] w-full overflow-hidden bg-slate-100 sm:h-[340px]">
    <img src="${imgs[modalImgIdx]}" alt="${esc(p.title)} ${modalImgIdx+1}" class="h-full w-full object-cover transition-opacity"/>
    <button onclick="event.stopPropagation();prevModalImg()" class="absolute left-2 top-1/2 flex h-8 w-8 -translate-y-1/2 items-center justify-center rounded-full bg-black/40 text-white backdrop-blur-sm hover:bg-black/60"><svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
    <button onclick="event.stopPropagation();nextModalImg()" class="absolute right-2 top-1/2 flex h-8 w-8 -translate-y-1/2 items-center justify-center rounded-full bg-black/40 text-white backdrop-blur-sm hover:bg-black/60"><svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></button>
    <span class="absolute right-3 top-3 rounded-full bg-black/50 px-2 py-0.5 text-xs font-bold text-white">${modalImgIdx+1}/${imgs.length}</span>
    <div class="absolute bottom-3 left-1/2 flex -translate-x-1/2 gap-1.5">`;
  imgs.forEach((_, i) => {
    h += `<button onclick="event.stopPropagation();setModalImg(${i})" class="h-2 rounded-full transition-all ${i === modalImgIdx ? "w-5 bg-white" : "w-2 bg-white/50"}"></button>`;
  });
  h += `</div></div>`;

  // Thumbnails
  h += `<div class="flex gap-1.5 overflow-x-auto bg-white px-3 py-2 hide-scrollbar">`;
  imgs.forEach((src, i) => {
    h += `<button onclick="event.stopPropagation();setModalImg(${i})" class="h-14 w-14 shrink-0 overflow-hidden rounded-lg border-2 transition-all ${i === modalImgIdx ? "border-orange-500 ring-1 ring-orange-400" : "border-transparent opacity-60 hover:opacity-80"}"><img src="${src}" alt="Thumb ${i+1}" class="h-full w-full object-cover"/></button>`;
  });
  h += `</div>`;

  // Product info
  h += `<div class="px-4 pb-6 pt-2">`;
  if (p.tag) h += `<span class="mb-2 inline-block rounded-full bg-orange-100 px-2.5 py-0.5 text-[11px] font-bold text-orange-700">${esc(p.tag)}</span>`;
  h += `<h2 class="text-lg font-extrabold text-slate-900">${esc(p.title)}</h2>
    <p class="mt-1 text-sm text-slate-500">${esc(p.category)} \u00B7 ${esc(p.stat)}</p>
    <div class="mt-3 flex items-baseline gap-2"><span class="text-2xl font-extrabold text-rose-600">${esc(p.price)}</span>
      ${p.priceHigh ? `<span class="text-sm text-slate-400">\u2013 ${esc(p.priceHigh)}</span>` : ""}
      <span class="text-xs text-slate-400">GCV</span></div>
    <div class="mt-4 grid grid-cols-3 gap-2 text-center text-[11px]">
      <div class="rounded-lg bg-slate-50 py-2"><p class="font-bold text-slate-700">Pi Secured</p><p class="text-slate-400">Safe Trade</p></div>
      <div class="rounded-lg bg-slate-50 py-2"><p class="font-bold text-slate-700">Verified</p><p class="text-slate-400">Seller</p></div>
      <div class="rounded-lg bg-slate-50 py-2"><p class="font-bold text-slate-700">Global</p><p class="text-slate-400">Shipping</p></div>
    </div>
    <div class="mt-4 flex gap-2">
      <button class="flex-1 rounded-xl bg-orange-500 py-3 text-sm font-bold text-white transition-colors hover:bg-orange-600">\u03C0 Buy Now (${esc(p.price)})</button>
      <button class="flex-1 rounded-xl border border-orange-500 py-3 text-sm font-bold text-orange-600 transition-colors hover:bg-orange-50">Add to Cart</button>
    </div></div>`;

  document.getElementById("modal-content").innerHTML = h;
}

// ── Live product modal ──
function openLiveModal(id) {
  var p = liveProducts.find(function(x) { return x.id == id; });
  if (!p) return;
  var imgs = [p.image1, p.image2, p.image3, p.image4, p.image5, p.image6].filter(Boolean).map(function(src) {
    return src.startsWith('http') ? src : 'backend/' + src;
  });
  if (imgs.length === 0) imgs = ['https://via.placeholder.com/600x400?text=No+Image'];
  modalImgIdx = 0;

  var h = '';
  h += '<button onclick="closeModal()" class="absolute right-3 top-3 z-10 flex h-8 w-8 items-center justify-center rounded-full bg-black/40 text-white backdrop-blur-sm hover:bg-black/60 transition"><svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>';
  h += '<div class="relative h-[280px] w-full overflow-hidden bg-slate-100 sm:h-[340px]"><img id="live-modal-img" src="' + imgs[0] + '" alt="' + esc(p.name) + '" class="h-full w-full object-cover"/>';
  h += '<span class="absolute right-3 top-3 rounded-full bg-black/50 px-2 py-0.5 text-xs font-bold text-white">1/' + imgs.length + '</span></div>';
  if (imgs.length > 1) {
    h += '<div class="flex gap-1.5 overflow-x-auto bg-white px-3 py-2 hide-scrollbar">';
    imgs.forEach(function(src, i) {
      h += '<button onclick="event.stopPropagation();document.getElementById(\'live-modal-img\').src=\'' + src + '\'" class="h-14 w-14 shrink-0 overflow-hidden rounded-lg border-2 transition-all ' + (i === 0 ? 'border-orange-500' : 'border-transparent opacity-60 hover:opacity-80') + '"><img src="' + src + '" class="h-full w-full object-cover"/></button>';
    });
    h += '</div>';
  }
  h += '<div class="px-4 pb-6 pt-3">';
  if (p.condition) h += '<span class="mb-2 inline-block rounded-full bg-emerald-100 px-2.5 py-0.5 text-[11px] font-bold text-emerald-700">' + esc(p.condition) + '</span> ';
  h += '<span class="mb-2 inline-block rounded-full bg-violet-100 px-2.5 py-0.5 text-[11px] font-bold text-violet-700">' + esc(p.category) + '</span>';
  h += '<h2 class="mt-1 text-lg font-extrabold text-slate-900">' + esc(p.name) + '</h2>';
  h += '<p class="mt-0.5 text-[12px] text-slate-500">by ' + esc(p.seller_name || 'Pioneer') + '</p>';
  h += '<div class="mt-3 flex items-baseline gap-2"><span class="text-2xl font-extrabold text-rose-600">\u03C0' + esc(p.price) + '</span><span class="text-xs text-slate-400">Pi</span></div>';
  if (p.description) h += '<p class="mt-3 text-[13px] leading-relaxed text-slate-600">' + esc(p.description) + '</p>';
  h += '<div class="mt-4 grid grid-cols-3 gap-2 text-center text-[11px]"><div class="rounded-lg bg-slate-50 py-2"><p class="font-bold text-slate-700">Pi Secured</p><p class="text-slate-400">Safe Trade</p></div><div class="rounded-lg bg-slate-50 py-2"><p class="font-bold text-slate-700">KYC Verified</p><p class="text-slate-400">Seller</p></div><div class="rounded-lg bg-slate-50 py-2"><p class="font-bold text-slate-700">Escrow</p><p class="text-slate-400">Protected</p></div></div>';
  h += '<div class="mt-4 flex gap-2"><button class="flex-1 rounded-xl bg-orange-500 py-3 text-sm font-bold text-white transition-colors hover:bg-orange-600">\u03C0 Buy Now</button><button class="flex-1 rounded-xl border border-orange-500 py-3 text-sm font-bold text-orange-600 transition-colors hover:bg-orange-50">Message Seller</button></div>';
  h += '</div>';

  document.getElementById('modal-content').innerHTML = h;
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

// ── Keyboard support ──
document.addEventListener("keydown", function(e) {
  if (!selectedProduct) return;
  if (e.key === "Escape") closeModal();
  if (e.key === "ArrowLeft") prevModalImg();
  if (e.key === "ArrowRight") nextModalImg();
});

// ── INIT ──
render();
</script>
</body>
</html>
