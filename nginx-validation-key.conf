# Nginx snippet to unblock Pi domain validation key
# Place inside your server { ... } block for omendapipaysglobel.online

# Serve exact validation key file without SPA rewrite
location = /validation-key.txt {
    default_type text/plain;
    add_header Cache-Control "no-store" always;
    try_files /validation-key.txt =404;
}

# Typical SPA fallback (keep this after the exact match above)
location / {
    try_files $uri $uri/ /index.html;
}
