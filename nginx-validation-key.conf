# ─── Full Nginx + SSL config for omendapipaysglobel.online ───
# Deploy: sudo cp this file to /etc/nginx/sites-available/omendapipays
#         sudo ln -s /etc/nginx/sites-available/omendapipays /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx
#
# SSL cert: sudo certbot --nginx -d omendapipaysglobel.online -d www.omendapipaysglobel.online
# Renew:    sudo certbot renew --dry-run

# ── 1. HTTP → HTTPS redirect (port 80) ───────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name omendapipaysglobel.online www.omendapipaysglobel.online;

    # Allow Pi domain-verification key over plain HTTP as well
    location = /validation-key.txt {
        root /var/www/omendapipays;
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        try_files /validation-key.txt =404;
    }

    # Let certbot own /.well-known/acme-challenge/ for renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── 2. HTTPS server (port 443) ───────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name omendapipaysglobel.online www.omendapipaysglobel.online;

    # ── SSL certificate (managed by Certbot / Let's Encrypt) ─────────────────
    ssl_certificate     /etc/letsencrypt/live/omendapipaysglobel.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/omendapipaysglobel.online/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/omendapipaysglobel.online/chain.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    # Avoid WebView/iframe blocking in Pi contexts; use CSP frame-ancestors instead of X-Frame-Options.
    add_header Content-Security-Policy   "frame-ancestors 'self' https://*.minepi.com https://minepi.com" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    # Pi Browser embeds the app in a WebView. If any upstream layer sends X-Frame-Options,
    # Chromium blocks the page with ERR_BLOCKED_BY_RESPONSE before CSP can help.
    proxy_hide_header X-Frame-Options;

    # ── Pi domain validation key ──────────────────────────────────────────────
    location = /validation-key.txt {
        root /var/www/omendapipays;
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        try_files /validation-key.txt =404;
    }

    # ── Certbot ACME challenges (HTTPS renewal) ───────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Proxy to Next.js app (running on localhost:3000) ─────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
        proxy_hide_header  X-Frame-Options;
    }
}
